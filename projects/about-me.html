    <!-- ── Center overlay ────────────────────────────────────────────────── -->
    <div class="about-center-overlay">
        <div class="about-me-more-text">
            <!-- Star — drop target for canvas icons -->
            <div class="tldr-placeholder" id="tldr-placeholder">
                <svg class="north-star" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
                    <!-- Outline drawn by DrawSVG on drag -->
                    <rect class="star-border" x="1" y="1" width="42" height="42"
                          fill="none" stroke="#3161f9" stroke-width="1.5"/>
                    <!-- Star shape — morphs to + on drag -->
                    <path class="north-star-shape"
                          d="M22,2 L25,19 L42,22 L25,25 L22,42 L19,25 L2,22 L19,19 Z"
                          fill="#3161f9"/>
                    <!-- Plus target — 11×11px centred at (22,22), hidden, used as MorphSVG destination -->
                    <path class="north-star-plus"
                          d="M20.5,16.5 L23.5,16.5 L23.5,20.5 L27.5,20.5 L27.5,23.5 L23.5,23.5 L23.5,27.5 L20.5,27.5 L20.5,23.5 L16.5,23.5 L16.5,20.5 L20.5,20.5 Z"
                          fill="none" visibility="hidden"/>
                </svg>
            </div>
        </div>

        <!-- TLDR card — shown on "more", content wired by pretext -->
        <div class="about-tldr-card" id="about-tldr-card" style="display:none;">

        </div>

        <!-- Story navigator — shown on "more" -->
